<!DOCTYPE html>
<html>
<head>
    <title>Register - Medical AI Assistant</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #1e1f26;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .auth-container {
            width: 480px;
            padding: 50px 45px;
            border-radius: 18px;
            background: #2a2b32;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            color: white;   /* 🔥 ADD THIS */
        }

        .auth-container h2 {
            margin-bottom: 32px;     /* more space below heading */
            font-size: 26px;
            font-weight: 600;
        }

        .auth-container input {
            width: 100%;
            padding: 16px 18px;
            margin-bottom: 20px;     /* spacing between fields */
            border-radius: 12px;
            border: none;
            outline: none;
            background: #3a3b45;
            color: white;
            font-size: 14px;
        }

        .auth-container input::placeholder {
            color: #aaa;
        }
        .auth-container button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            margin-top: 10px;
            background: #10a37f;
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .auth-container button:hover {
            background: #0d8a6c;
        }

        .auth-container p {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #aaa;
        }

        .auth-container a {
            color: #10a37f;
            text-decoration: none;
            font-weight: 500;
        }

        .auth-container a:hover {
            text-decoration: underline;
        }
        .auth-wrapper {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1f2937, #111827);
        }

        .flash-message {
            background: #ff4d4d;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 12px;
            text-align: center;
            font-size: 13px;
            color: white;
        }
    </style>
</head>

<body>

<div class="auth-container">

    <h2>Create Account</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
        <div class="alert {{ category }}">
            {{ message }}
        </div>
        {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST">

        <input name="username"
               type="text"
               placeholder="Username"
               required>

        <input name="email"
               type="email"
               placeholder="Email"
               required>

        <input name="password"
               type="password"
               placeholder="Password"
               required>

        <button type="submit">Register</button>

    </form>

    <p>
        Already have an account?
        <a href="/login">Login</a>
    </p>

</div>

</body>
</html>
